{% extends "base.html" %}

{% block title %}Cover Letter Editor - Resume Builder{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/editor.css') }}">
<style>
    .cl-input-section {
        padding: 16px;
        border-bottom: 1px solid #e0e0e0;
        background: #fafafa;
    }
    .cl-input-section .form-group { margin-bottom: 10px; }
    .cl-input-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
    }
    .cl-actions {
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        border-bottom: 1px solid #e0e0e0;
        background: #fff;
    }
    .cl-editor-wrap {
        flex: 1;
        overflow: hidden;
    }
    #cl-ace-editor {
        width: 100%;
        height: 100%;
        font-size: 13px;
    }
    .cl-preview-frame {
        width: 100%;
        height: 100%;
        border: none;
        background: #fff;
    }
    .split-left { display: flex; flex-direction: column; }
</style>
{% endblock %}

{% block content %}
<div class="split-pane">
    <!-- Left pane: Inputs + YAML editor -->
    <div class="split-left">
        <div class="cl-input-section">
            <div class="cl-input-row">
                <div class="form-group">
                    <label for="cl-company">Company</label>
                    <input type="text" id="cl-company" placeholder="e.g. Anthropic" value="{{ settings.company|default('') }}">
                </div>
                <div class="form-group">
                    <label for="cl-role">Role</label>
                    <input type="text" id="cl-role" placeholder="e.g. Software Engineer" value="{{ settings.role|default('') }}">
                </div>
                <div class="form-group">
                    <label for="cl-hiring-manager">Hiring Manager</label>
                    <input type="text" id="cl-hiring-manager" placeholder="e.g. Jane Smith (optional)" value="{{ settings.hiring_manager|default('') }}">
                </div>
            </div>
            <div class="form-group">
                <label for="cl-jd">Job Description</label>
                <textarea id="cl-jd" rows="4" placeholder="Paste JD here for a tailored cover letter...">{{ settings.jd|default('') }}</textarea>
            </div>
        </div>
        <div class="cl-actions">
            <button class="btn btn-primary btn-sm" id="btn-cl-generate">Generate</button>
            <button class="btn btn-secondary btn-sm" id="btn-cl-preview">Preview</button>
            <button class="btn btn-secondary btn-sm" id="btn-cl-download">Download PDF</button>
            <button class="btn btn-secondary btn-sm" id="btn-cl-save">Save Draft</button>
        </div>
        <div class="cl-editor-wrap">
            <div id="cl-ace-editor">{{ draft|default('') }}</div>
        </div>
    </div>

    <!-- Right pane: Live preview -->
    <div class="split-right">
        <div class="preview-header">
            <span class="text-sm text-muted">Cover Letter Preview</span>
        </div>
        <div class="preview-container">
            <iframe id="cl-preview-iframe" class="cl-preview-frame" sandbox="allow-same-origin"></iframe>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
<script>
(function() {
    // Ace editor setup
    var editor = ace.edit('cl-ace-editor');
    editor.setTheme('ace/theme/chrome');
    editor.session.setMode('ace/mode/yaml');
    editor.setOptions({
        fontSize: '13px',
        showPrintMargin: false,
        wrap: true,
        tabSize: 2,
        useSoftTabs: true
    });

    function getInputs() {
        return {
            company: document.getElementById('cl-company').value,
            role: document.getElementById('cl-role').value,
            hiring_manager: document.getElementById('cl-hiring-manager').value,
            jd: document.getElementById('cl-jd').value,
        };
    }

    // Generate cover letter
    document.getElementById('btn-cl-generate').onclick = function() {
        var btn = this;
        btn.disabled = true;
        btn.textContent = 'Generating...';
        fetch('/api/cover_letter/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(getInputs())
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) { showToast(data.error, 'error'); return; }
            editor.setValue(data.yaml || '', -1);
            updatePreview();
            showToast('Cover letter generated', 'success');
        })
        .catch(function(err) { showToast('Generation failed: ' + err, 'error'); })
        .finally(function() { btn.disabled = false; btn.textContent = 'Generate'; });
    };

    // Preview
    function updatePreview() {
        fetch('/api/cover_letter/preview', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ yaml_content: editor.getValue() })
        })
        .then(function(r) { return r.text(); })
        .then(function(html) {
            var iframe = document.getElementById('cl-preview-iframe');
            iframe.srcdoc = html;
        })
        .catch(function(err) { showToast('Preview failed: ' + err, 'error'); });
    }

    document.getElementById('btn-cl-preview').onclick = updatePreview;

    // Save draft
    document.getElementById('btn-cl-save').onclick = function() {
        fetch('/api/cover_letter/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ yaml_content: editor.getValue() })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) { showToast(data.error, 'error'); return; }
            showToast('Draft saved', 'success');
        })
        .catch(function(err) { showToast('Save failed: ' + err, 'error'); });
    };

    // Download PDF
    document.getElementById('btn-cl-download').onclick = function() {
        var form = document.createElement('form');
        form.method = 'POST';
        form.action = '/api/cover_letter/pdf';
        var input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'yaml_content';
        input.value = editor.getValue();
        form.appendChild(input);
        document.body.appendChild(form);
        form.submit();
        form.remove();
    };

    // Auto-preview on editor change (debounced)
    var previewTimer = null;
    editor.session.on('change', function() {
        clearTimeout(previewTimer);
        previewTimer = setTimeout(updatePreview, 800);
    });

    // Initial preview
    if (editor.getValue().trim()) {
        updatePreview();
    }
})();
</script>
{% endblock %}
