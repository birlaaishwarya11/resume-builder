{% extends "base.html" %}
{% block title %}Cover Letter Rules - Resume Builder{% endblock %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/databases.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/rules_toggles.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/rules_validate.css') }}">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
{% endblock %}
{% block content %}
<div class="db-editor-container">
    <div class="db-toolbar">
        <div class="db-toolbar-left">
            <a href="{{ url_for('settings.knowledge_page') }}" class="btn btn-secondary btn-sm">&larr; Knowledge</a>
            <h2>Cover Letter Rules</h2>
        </div>
        <div class="db-toolbar-right">
            <span id="save-status" class="text-muted text-sm"></span>
            <button class="btn btn-primary" onclick="saveContent()">Save</button>
        </div>
    </div>
    <div id="rules-toggles" class="rules-toggles"></div>
    <div class="db-split">
        <div class="db-editor-pane">
            <div id="editor" class="ace-editor"></div>
        </div>
        <div class="db-preview-pane">
            <div id="preview" class="md-preview"></div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/databases.js') }}"></script>
<script src="{{ url_for('static', filename='js/rules_toggles.js') }}"></script>
<script src="{{ url_for('static', filename='js/rules_validate.js') }}"></script>
<script>
    initDatabaseEditor('cover_letter_rules');
    initRulesToggles('cover_letter_rules');
    initRulesValidate('cover_letter_rules');
</script>
{% endblock %}
